<app-page-header
  title="My Profile"
  subtitle="Manage your account information"
></app-page-header>

<div class="profile-page">
  <mat-card class="profile-card">
    <!-- HEADER -->

    <div class="profile-header">
      <div class="avatar">
        <mat-icon>account_circle</mat-icon>
      </div>

      <div class="title">
        <h2>{{ profileForm.value.name || "User" }}</h2>
        <span>{{ profileForm.value.role }}</span>
      </div>

      <button
        mat-raised-button
        color="primary"
        *ngIf="!editMode"
        (click)="enableEdit()"
      >
        <mat-icon>edit</mat-icon>
        Edit Profile
      </button>
    </div>

    <!-- FORM -->

    <form [formGroup]="profileForm">
      <div class="grid">
        <!-- USERNAME -->

        <mat-form-field appearance="outline">
          <mat-label>Username</mat-label>
          <input matInput formControlName="username" readonly />
        </mat-form-field>

        <!-- FULL NAME -->

        <mat-form-field appearance="outline">
          <mat-label>Full Name</mat-label>
          <input matInput formControlName="name" [readonly]="!editMode" />
        </mat-form-field>

        <!-- EMAIL -->

        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" [readonly]="!editMode" />
        </mat-form-field>

        <!-- PHONE -->

        <mat-form-field appearance="outline">
          <mat-label>Phone</mat-label>
          <input matInput formControlName="phone" [readonly]="!editMode" />
        </mat-form-field>

        <!-- ROLE -->

        <mat-form-field appearance="outline">
          <mat-label>Role</mat-label>
          <input matInput formControlName="role" readonly />
        </mat-form-field>

        <!-- PASSWORD -->

        <mat-form-field appearance="outline" *ngIf="editMode">
          <mat-label>New Password</mat-label>
          <input matInput type="password" formControlName="password" />
        </mat-form-field>
      </div>

      <!-- ACTION BUTTONS -->

      <div class="actions" *ngIf="editMode">
        <button
          mat-raised-button
          color="primary"
          type="button"
          (click)="save()"
        >
          Save
        </button>

        <button
          mat-stroked-button
          color="warn"
          type="button"
          (click)="cancel()"
        >
          Cancel
        </button>
      </div>
    </form>
  </mat-card>
</div>
