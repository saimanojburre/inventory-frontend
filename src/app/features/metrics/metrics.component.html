<app-page-header
  title="Usage Report"
  subtitle="Department-wise inventory usage analytics"
></app-page-header>

<!-- =====================================================
     FILTER TOOLBAR
====================================================== -->

<div class="toolbar-card">
  <div class="toolbar">
    <!-- LEFT -->

    <div class="toolbar-left">
      <mat-form-field appearance="outline" class="toolbar-field">
        <mat-label>From Date</mat-label>

        <input matInput [matDatepicker]="fromPicker" [(ngModel)]="fromDate" />

        <mat-datepicker-toggle
          matSuffix
          [for]="fromPicker"
        ></mat-datepicker-toggle>

        <mat-datepicker #fromPicker></mat-datepicker>
      </mat-form-field>

      <mat-form-field appearance="outline" class="toolbar-field">
        <mat-label>To Date</mat-label>

        <input matInput [matDatepicker]="toPicker" [(ngModel)]="toDate" />

        <mat-datepicker-toggle
          matSuffix
          [for]="toPicker"
        ></mat-datepicker-toggle>

        <mat-datepicker #toPicker></mat-datepicker>
      </mat-form-field>
    </div>

    <!-- RIGHT -->

    <div class="toolbar-right">
      <button
        mat-raised-button
        color="primary"
        class="apply-btn"
        (click)="loadReport()"
      >
        <mat-icon>filter_alt</mat-icon>

        Apply Filters
      </button>
    </div>
  </div>
</div>

<!-- =====================================================
     LOADING
====================================================== -->

<div *ngIf="loading" class="report-card">
  <div class="skeleton-row" *ngFor="let i of [1, 2, 3, 4, 5, 6]">
    <div class="skeleton-line long"></div>

    <div class="skeleton-line short" *ngFor="let c of categories"></div>

    <div class="skeleton-line medium"></div>
  </div>
</div>

<!-- =====================================================
     EMPTY STATE
====================================================== -->

<div *ngIf="!loading && dataSource.length === 0" class="empty-state">
  <div class="empty-icon">
    <mat-icon>bar_chart</mat-icon>
  </div>

  <h3>No Usage Data Available</h3>

  <p>No usage records found for the selected date range.</p>
</div>

<!-- =====================================================
     REPORT TABLE
====================================================== -->

<div *ngIf="!loading && dataSource.length > 0" class="report-card">
  <div class="table-wrapper">
    <table mat-table [dataSource]="dataSource" class="report-table">
      <!-- DEPARTMENT -->

      <ng-container matColumnDef="department">
        <th mat-header-cell *matHeaderCellDef class="left sticky-col">
          Department
        </th>

        <td
          mat-cell
          *matCellDef="let r"
          class="left sticky-col"
          [class.total-cell-left]="r.department === 'Total'"
        >
          <div class="department-cell">
            <div
              class="department-avatar"
              [class.total-avatar]="r.department === 'Total'"
            >
              {{ r.department?.charAt(0) }}
            </div>

            <span>
              {{ r.department }}
            </span>
          </div>
        </td>
      </ng-container>

      <!-- CATEGORY COLUMNS -->

      <ng-container *ngFor="let col of categories" [matColumnDef]="col">
        <th mat-header-cell *matHeaderCellDef class="right">
          {{ col }}
        </th>

        <td
          mat-cell
          *matCellDef="let r"
          class="right"
          [class.total-row-text]="r.department === 'Total'"
        >
          <div class="amount-chip">
            {{ formatCurrency(r[col]) }}
          </div>
        </td>
      </ng-container>

      <!-- TOTAL -->

      <ng-container matColumnDef="total">
        <th mat-header-cell *matHeaderCellDef class="right total-header">
          Grand Total
        </th>

        <td mat-cell *matCellDef="let r" class="right total-cell">
          <div class="grand-total-chip">
            {{ formatCurrency(r.total) }}
          </div>
        </td>
      </ng-container>

      <!-- HEADER -->

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

      <!-- ROW -->

      <tr
        mat-row
        *matRowDef="let row; columns: displayedColumns"
        [class.total-row]="row.department === 'Total'"
      ></tr>
    </table>
  </div>
</div>
