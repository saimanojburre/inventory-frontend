<app-page-header
  title="Products"
  subtitle="Manage inventory products"
></app-page-header>

<!-- TOOLBAR -->
<div class="page-header">
  <div class="left-actions">
    <button
      *ngIf="!loading && dataSource.data.length > 0"
      mat-raised-button
      color="primary"
      routerLink="/app/items/add"
    >
      <mat-icon>add</mat-icon>
      Add Product
    </button>
  </div>

  <div class="right-actions">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Search products</mat-label>
      <input matInput [formControl]="searchControl" />
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>

    <button mat-raised-button color="accent" (click)="exportToExcel()">
      <mat-icon>download</mat-icon>
      Export
    </button>
  </div>
</div>

<!-- LOADING -->

<div *ngIf="loading" class="loading">
  <mat-spinner diameter="40"></mat-spinner>
</div>

<!-- EMPTY STATE -->

<div *ngIf="!loading && dataSource.data.length === 0" class="empty-state">
  <mat-icon>inventory_2</mat-icon>

  <h3>No Products Yet</h3>

  <p>Add your first product to start managing inventory.</p>

  <button mat-raised-button color="primary" routerLink="/app/items/add">
    <mat-icon>add</mat-icon>
    Add Product
  </button>
</div>

<!-- TABLE -->

<!-- TABLE -->

<div *ngIf="!loading && dataSource.data.length > 0" class="items-view">
  <div class="table-wrapper">
    <table mat-table [dataSource]="dataSource" matSort>
      <!-- NAME -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Product</th>
        <td mat-cell *matCellDef="let r">
          <ng-container *ngIf="editingId === r.id; else nameView">
            <input class="inline-input" [(ngModel)]="r.name" />
          </ng-container>
          <ng-template #nameView>{{ r.name }}</ng-template>
        </td>
      </ng-container>

      <!-- CATEGORY -->
      <ng-container matColumnDef="category">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Category</th>

        <td mat-cell *matCellDef="let r">
          <ng-container *ngIf="editingId === r.id; else catView">
            <mat-select [(ngModel)]="r.category" class="inline-select">
              <mat-option *ngFor="let c of categories" [value]="c">
                {{ c }}
              </mat-option>
            </mat-select>
          </ng-container>

          <ng-template #catView>
            {{ r.category }}
          </ng-template>
        </td>
      </ng-container>

      <!-- UNIT -->
      <ng-container matColumnDef="unit">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Unit</th>

        <td mat-cell *matCellDef="let r">
          <ng-container *ngIf="editingId === r.id; else unitView">
            <mat-select [(ngModel)]="r.unit" class="inline-select">
              <mat-option *ngFor="let u of units" [value]="u">
                {{ u }}
              </mat-option>
            </mat-select>
          </ng-container>

          <ng-template #unitView>
            {{ r.unit }}
          </ng-template>
        </td>
      </ng-container>

      <!-- MIN STOCK -->
      <ng-container matColumnDef="minStock">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Min Stock</th>
        <td mat-cell *matCellDef="let r">
          <ng-container *ngIf="editingId === r.id; else stockView">
            <input
              type="number"
              class="inline-input"
              [(ngModel)]="r.minStock"
            />
          </ng-container>
          <ng-template #stockView>{{ r.minStock }}</ng-template>
        </td>
      </ng-container>

      <!-- STATUS -->
      <ng-container matColumnDef="active">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let r">
          <ng-container *ngIf="editingId === r.id; else statusView">
            <mat-select [(ngModel)]="r.active" class="inline-select">
              <mat-option [value]="true">Active</mat-option>
              <mat-option [value]="false">Inactive</mat-option>
            </mat-select>
          </ng-container>

          <ng-template #statusView>
            <span *ngIf="r.active" class="badge active">Active</span>
            <span *ngIf="!r.active" class="badge inactive">Inactive</span>
          </ng-template>
        </td>
      </ng-container>

      <!-- ACTIONS -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>

        <td mat-cell *matCellDef="let r">
          <ng-container *ngIf="editingId === r.id; else normalActions">
            <button mat-icon-button color="primary" (click)="saveEdit(r)">
              <mat-icon>check</mat-icon>
            </button>

            <button mat-icon-button color="warn" (click)="cancelEdit(r)">
              <mat-icon>close</mat-icon>
            </button>
          </ng-container>

          <ng-template #normalActions>
            <button mat-icon-button color="primary" (click)="edit(r)">
              <mat-icon>edit</mat-icon>
            </button>

            <button mat-icon-button color="warn" (click)="delete(r)">
              <mat-icon>delete</mat-icon>
            </button>
          </ng-template>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr
        mat-row
        *matRowDef="let row; columns: displayedColumns"
        [class.editing-row]="editingId === row.id"
      ></tr>
    </table>
  </div>

  <mat-paginator
    [pageSizeOptions]="[5, 10, 20, 50]"
    [pageSize]="10"
    showFirstLastButtons
  ></mat-paginator>
</div>
