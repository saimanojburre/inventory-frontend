<app-page-header title="Add Products" subtitle="Create inventory products">
</app-page-header>

<div class="page-header">
  <button mat-button (click)="goBack()">← Back</button>

  <button mat-raised-button color="primary" (click)="fileInput.click()">
    <mat-icon>upload</mat-icon>
    Upload XLSX
  </button>

  <input
    type="file"
    #fileInput
    hidden
    accept=".xlsx,.xls"
    (change)="onFileUpload($event)"
  />
</div>

<div class="purchase-container">
  <form [formGroup]="itemForm">
    <div class="table-wrapper premium-table">
      <table
        mat-table
        [dataSource]="itemsFormArray.controls"
        class="purchase-table"
      >
        <!-- PRODUCT NAME -->
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef class="col-item">Product</th>

          <td mat-cell *matCellDef="let row">
            <mat-form-field appearance="outline">
              <input
                matInput
                placeholder="Enter product name"
                [formControl]="row.get('name')"
              />

              <mat-error *ngIf="row.get('name')?.hasError('required')">
                Product name is required
              </mat-error>
            </mat-form-field>
          </td>
        </ng-container>

        <!-- CATEGORY -->
        <ng-container matColumnDef="category">
          <th mat-header-cell *matHeaderCellDef class="col-medium">Category</th>

          <td mat-cell *matCellDef="let row">
            <mat-form-field appearance="outline">
              <mat-select
                placeholder="Select Category"
                [formControl]="row.get('category')"
              >
                <mat-option *ngFor="let c of categories" [value]="c">
                  {{ c }}
                </mat-option>
              </mat-select>

              <mat-error *ngIf="row.get('category')?.hasError('required')">
                Category is required
              </mat-error>
            </mat-form-field>
          </td>
        </ng-container>

        <!-- UNIT -->
        <ng-container matColumnDef="unit">
          <th mat-header-cell *matHeaderCellDef class="col-small">Unit</th>

          <td mat-cell *matCellDef="let row">
            <mat-form-field appearance="outline">
              <mat-select
                placeholder="Select Unit"
                [formControl]="row.get('unit')"
              >
                <mat-option *ngFor="let u of units" [value]="u">
                  {{ u }}
                </mat-option>
              </mat-select>

              <mat-error *ngIf="row.get('unit')?.hasError('required')">
                Unit is required
              </mat-error>
            </mat-form-field>
          </td>
        </ng-container>

        <!-- MIN STOCK -->
        <ng-container matColumnDef="minStock">
          <th mat-header-cell *matHeaderCellDef class="col-small">Min Stock</th>

          <td mat-cell *matCellDef="let row">
            <mat-form-field appearance="outline">
              <input
                type="number"
                matInput
                placeholder="Minimum stock level"
                [formControl]="row.get('minStock')"
              />

              <mat-error *ngIf="row.get('minStock')?.hasError('required')">
                Minimum stock is required
              </mat-error>
            </mat-form-field>
          </td>
        </ng-container>

        <!-- QUANTITY -->
        <ng-container matColumnDef="quantity">
          <th mat-header-cell *matHeaderCellDef class="col-small">Qty</th>

          <td mat-cell *matCellDef="let row">
            <mat-form-field appearance="outline">
              <input
                type="number"
                matInput
                placeholder="Initial quantity"
                [formControl]="row.get('quantity')"
              />
            </mat-form-field>
          </td>
        </ng-container>

        <!-- ACTIONS -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef class="col-actions"></th>

          <td mat-cell *matCellDef="let row; let i = index">
            <button mat-icon-button color="primary" (click)="addRow()">
              <mat-icon>add</mat-icon>
            </button>

            <button
              mat-icon-button
              color="warn"
              *ngIf="itemsFormArray.length > 1"
              (click)="removeRow(i)"
            >
              <mat-icon>remove</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
    </div>
  </form>

  <div class="save-section">
    <button mat-raised-button color="primary" (click)="saveItems()">
      Save Products
    </button>
  </div>
</div>
