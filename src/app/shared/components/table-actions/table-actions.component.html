<div class="table-actions">
  <ng-container *ngIf="editing; else normalMode">
    <button
      mat-icon-button
      class="action-btn save-action"
      matTooltip="Save"
      matTooltipPosition="above"
      (click)="save.emit()"
      [disabled]="saving"
    >
      <mat-spinner *ngIf="saving" diameter="18"></mat-spinner>

      <mat-icon *ngIf="!saving">check</mat-icon>
    </button>

    <button
      mat-icon-button
      class="action-btn cancel-action"
      matTooltip="Cancel"
      matTooltipPosition="above"
      (click)="cancel.emit()"
      [disabled]="saving"
    >
      <mat-icon>close</mat-icon>
    </button>
  </ng-container>

  <ng-template #normalMode>
    <button
      mat-icon-button
      class="action-btn edit-action"
      matTooltip="Edit"
      matTooltipPosition="above"
      (click)="edit.emit()"
      [disabled]="disableEdit || deleting"
    >
      <mat-icon>edit</mat-icon>
    </button>

    <button
      mat-icon-button
      class="action-btn delete-action"
      matTooltip="Delete"
      matTooltipPosition="above"
      (click)="delete.emit()"
      [disabled]="disableDelete || deleting"
    >
      <mat-spinner *ngIf="deleting" diameter="18"></mat-spinner>

      <mat-icon *ngIf="!deleting">delete</mat-icon>
    </button>
  </ng-template>
</div>
