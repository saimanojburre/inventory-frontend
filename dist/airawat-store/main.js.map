<div class="page-header">
  <!-- LEFT -->
  <div class="title-section">
    <div class="title-row">
      <h1>
        {{ title }}
      </h1>
    </div>

    <p *ngIf="subtitle">
      {{ subtitle }}
    </p>
  </div>

  <!-- RIGHT ACTIONS -->
  <div class="actions" *ngIf="hasProjectedContent">
    <ng-content></ng-content>
  </div>
</div>
